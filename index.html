<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - TODO App</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>✅ TaskMaster</h1>
        <div class="subtitle">Get things done, one task at a time</div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a task... press Enter ↵"
                onkeypress="if(event.key === 'Enter') addTask()">
            <button id="addBtn" onclick="addTask()">+ Add Task</button>
        </div>

        <!-- FILTERS -->
        <div class="filter-buttons">
            <button class="active" onclick="setFilter('all', event)">All</button>
            <button onclick="setFilter('active', event)">Active</button>
            <button onclick="setFilter('completed', event)">Completed</button>
        </div>

        <!-- COUNTER -->
        <div class="remaining-counter">
            <span id="remainingCount">0</span> tasks remaining
        </div>

        <!-- PROGRESS -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- TASK LIST -->
        <ul class="task-list" id="taskList">
            <li class="empty-message">No tasks yet ✨</li>
        </ul>

        <div class="stats">
            <span id="taskCount">0</span> tasks total
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
