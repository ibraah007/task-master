<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My TODO App - Hackathon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✅ TaskMaster</h1>
        <div class="subtitle">Get things done, one task at a time</div>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?" onkeypress="if(event.key === 'Enter') addTask()">
            <button id="addBtn" onclick="addTask()">+ Add Task</button>
        </div>

        <!-- FILTER BUTTONS (NEW) -->
        <div class="filter-buttons">
            <button onclick="setFilter('all')">All</button>
            <button onclick="setFilter('active')">Active</button>
            <button onclick="setFilter('completed')">Completed</button>
        </div>

        <!-- Remaining tasks counter -->
        <div class="remaining-counter">
            <span id="remainingCount">0</span> tasks remaining
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <ul class="task-list" id="taskList">
            <li class="empty-message">No tasks yet. Add one above! ✨</li>
        </ul>
        
        <div class="stats" id="stats">
            <span id="taskCount">0</span> tasks total
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
